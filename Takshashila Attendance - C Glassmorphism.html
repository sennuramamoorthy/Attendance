document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2Fstyle>\n<style>\n  :root{\n    --ink:#1a1d3a; --ink-2:#2e3358; --muted:#6f7596;\n    --line:rgba(255,255,255,.55); --line-2:rgba(28,32,82,.08);\n    --glass:rgba(255,255,255,.55); --glass-2:rgba(255,255,255,.35);\n    --accent:#6d4cff; --accent-2:#22d3c7; --pink:#ff6ba6; --amber:#ffb84a;\n    --good:#0fb88f; --warn:#f59e0b; --bad:#ef4458;\n    --sans:'Plus Jakarta Sans',system-ui,sans-serif;\n    --mono:'JetBrains Mono',ui-monospace,monospace;\n    --r:22px;\n    --shadow: 0 14px 40px rgba(28,32,82,.08), 0 1px 0 rgba(255,255,255,.7) inset;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100%}\n  body{\n    background:\n      radial-gradient(900px 600px at 8% -5%, #d2c3ff 0%, transparent 60%),\n      radial-gradient(700px 500px at 95% 5%, #b9f2ec 0%, transparent 55%),\n      radial-gradient(800px 600px at 75% 95%, #ffd1de 0%, transparent 60%),\n      radial-gradient(700px 500px at 10% 90%, #fce5b3 0%, transparent 55%),\n      linear-gradient(180deg,#f4f1ff,#eaf6ff);\n    background-attachment:fixed;\n    min-height:100vh;\n  }\n  h1{font-size:32px;font-weight:700;margin:0;letter-spacing:-.02em}\n  h2{font-size:18px;font-weight:700;margin:0;letter-spacing:-.01em}\n  h3{font-size:14px;font-weight:700;margin:0}\n  .mono{font-family:var(--mono);font-size:11px}\n\n  /* Top app bar */\n  .topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.45);border-bottom:1px solid rgba(255,255,255,.6)}\n  .topbar-inner{display:flex;align-items:center;gap:18px;padding:14px 26px;max-width:1480px;margin:0 auto}\n  .brand{display:flex;align-items:center;gap:12px}\n  .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 8px 22px rgba(109,76,255,.35)}\n  .brand .name{font-weight:700;font-size:15px}\n  .brand .sub{font-size:11px;color:var(--muted)}\n  .roles{display:flex;gap:4px;margin-left:auto;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.7);padding:5px;border-radius:99px;backdrop-filter:blur(10px)}\n  .roles button{font-family:var(--sans);font-size:12px;font-weight:600;padding:7px 13px;border-radius:99px;border:0;background:transparent;color:var(--ink-2);cursor:pointer}\n  .roles button.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 6px 18px rgba(109,76,255,.3)}\n  .roles button:hover:not(.active){background:rgba(255,255,255,.6)}\n\n  .page{max-width:1480px;margin:0 auto;padding:30px 26px 80px}\n  .role-title{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:22px}\n  .role-title .crumb{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:600}\n  .role-title h1{margin-top:6px}\n\n  /* Glass card */\n  .glass{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:var(--r);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow)}\n  .pad{padding:20px 22px}\n  .pad-sm{padding:14px 16px}\n  .row{display:flex;gap:18px}\n  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}\n  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}\n  .grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:18px}\n  .grid-1-1{display:grid;grid-template-columns:1fr 1fr;gap:18px}\n\n  /* KPI */\n  .kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600}\n  .kpi .val{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-top:6px;background:linear-gradient(135deg,var(--ink),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}\n  .kpi .delta{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;font-weight:600;color:var(--good);background:rgba(15,184,143,.12);padding:3px 9px;border-radius:99px}\n\n  /* Pills */\n  .pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.6);color:var(--ink-2);border:1px solid rgba(255,255,255,.6)}\n  .pill.live{background:linear-gradient(135deg,#ff6ba6,#ef4458);color:#fff;border:0}\n  .pill.live::before{content:\"\";width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}\n  .pill.done{background:rgba(15,184,143,.18);color:#0a8a6b;border-color:rgba(15,184,143,.25)}\n  .pill.up{background:rgba(109,76,255,.14);color:var(--accent);border-color:rgba(109,76,255,.2)}\n  .pill.warn{background:rgba(245,158,11,.18);color:#a06200;border-color:rgba(245,158,11,.25)}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}\n\n  /* Buttons */\n  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:99px;font-size:12.5px;font-weight:600;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.6);color:var(--ink);cursor:pointer;backdrop-filter:blur(10px)}\n  .btn:hover{background:rgba(255,255,255,.85)}\n  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:0;box-shadow:0 10px 22px rgba(109,76,255,.3)}\n  .btn.dark{background:var(--ink);color:#fff;border:0}\n  .btn-row{display:flex;gap:8px;flex-wrap:wrap}\n\n  /* Table */\n  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}\n  th{text-align:left;padding:12px 14px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}\n  td{padding:13px 14px;border-top:1px solid var(--line-2)}\n\n  .progress{height:8px;background:rgba(255,255,255,.5);border-radius:99px;overflow:hidden;border:1px solid rgba(255,255,255,.7)}\n  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px}\n\n  /* Phone (mobile-f n-items:center;border-bottom:1px solid var(--line-2)\"><h2>Live class roll<\u002Fh2><span class=\"pill live\">REAL-TIME<\u002Fspan><\u002Fdiv>\n    <div class=\"pad\" style=\"max-height:340px;overflow:auto\">\n      ${D.todayCourses.map(c=>`\n        <div class=\"roster-card\">\n          <div style=\"display:flex;align-items:center;gap:12px\"><span class=\"badge-dot\" style=\"background:${schoolDot(c.school)}\"><\u002Fspan>\n          <div><div class=\"mono\" style=\"color:var(--muted)\">${c.code} · ${c.school}<\u002Fdiv><div style=\"font-weight:700\">${c.title}<\u002Fdiv><div style=\"font-size:11px;color:var(--muted)\">${c.faculty} · ${c.time}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px\">\n            <span class=\"pill ${c.status==='live'?'live':c.status==='done'?'done':'up'}\">${c.status==='live'?'LIVE':c.status==='done'?'CLOSED':'UPCOMING'}<\u002Fspan>\n            <span class=\"mono\" style=\"font-weight:700\">${c.present}/${c.total}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"glass\" style=\"margin-top:18px\">\n  <div class=\"pad\" style=\"display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line-2)\"><h2>Saved & scheduled reports<\u002Fh2><button class=\"btn primary\">+ New report<\u002Fbutton><\u002Fdiv>\n  <table>\n    <thead><tr><th>Report<\u002Fth><th>Audience<\u002Fth><th>Cadence<\u002Fth><th>Last run<\u002Fth><th>Format<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      ${[\n        ['Daily institutional roll-up','Registrar, VC','Daily 18:00','7 May 18:00','PDF + CSV','done'],\n        [\"Dean's weekly brief\",'6 deans','Mon 08:00','5 May 08:00','PDF','done'],\n        ['At-risk student watchlist','Class-in-Charge','Fri 12:00','2 May 12:00','CSV','done'],\n        ['Convocation eligibility','Chancellor, VC','Quarterly','31 Mar','PDF','up'],\n        ['Faculty compliance audit','Audit committee','Monthly 1st','1 May','XLSX','done'],\n      ].map(r=>`\n        <tr>\n          <td><strong>${r[0]}<\u002Fstrong><\u002Ftd>\n          <td>${r[1]}<\u002Ftd>\n          <td class=\"mono\">${r[2]}<\u002Ftd>\n          <td class=\"mono\">${r[3]}<\u002Ftd>\n          <td class=\"mono\">${r[4]}<\u002Ftd>\n          <td><span class=\"pill ${r[5]}\">${r[5]==='done'?'Delivered':'Scheduled'}<\u002Fspan><\u002Ftd>\n        <\u002Ftr>`).join('')}\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fdiv>`;\n\n// mount\nfunction render(role){\n  document.getElementById('page').innerHTML = views[role]();\n  document.querySelectorAll('#roles button').forEach(b => b.classList.toggle('active', b.dataset.role===role));\n  const cd = document.getElementById('cd3');\n  if(cd){ let s=47; clearInterval(window._cd); window._cd=setInterval(()=>{s=s<=0?60:s-1; cd.textContent='00:'+String(s).padStart(2,'0');},1000); }\n}\ndocument.getElementById('roles').addEventListener('click', e => { if(e.target.dataset.role) render(e.target.dataset.role); });\nrender('student');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
